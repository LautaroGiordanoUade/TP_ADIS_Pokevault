# Select which API the Android app should use.
#
# Options:
# - local: Android emulator -> backend running on this machine at 127.0.0.1:8000
# - current: same URL the app used before this config file existed
# - server: deployed Back4app API
# - deployed: alias for server
# - back4app: alias for server
#
# You can also override everything with API_BASE_URL.

API_TARGET=local

# Optional explicit override. Leave empty to use API_TARGET.
API_BASE_URL=
