name: Backend CI

on:
  pull_request:
    paths:
      - "backend.Api/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
      - dev-lau-docs-added
    paths:
      - "backend.Api/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend.Api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend.Api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall .

      - name: Import FastAPI app
        env:
          MYSQL_PASSWORD: ci-placeholder
        run: python -c "from main import app; print(app.title)"
